name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tuition
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Local Postgres service (not pooled) — no PgBouncer here, but db.py's
      # statement_cache_size=0 is harmless against plain Postgres.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tuition

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply migrations (alembic upgrade head)
        run: alembic upgrade head

      - name: Seed deterministic dataset
        run: python seed.py

      - name: Run tests
        run: pytest -ra
